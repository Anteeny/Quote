<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Quote Image Generator</title>
    <!-- Google Fonts for the cinematic serif and clean sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Montserrat:wght@400;600&display=swap"
        rel="stylesheet">

    <!-- html2canvas library for turning HTML into a downloadable image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --accent-color: #DAA520;
            /* Gold/Orange */
            --text-white: #FFFFFF;
            --text-gray: #8E8E8E;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #1a1a1a;
            color: var(--text-white);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-color);
        }

        /* Control Panel Styles */
        .controls {
            background-color: #242424;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: var(--text-gray);
        }

        textarea,
        input {
            width: 100%;
            padding: 12px;
            background-color: #121212;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-family: inherit;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s ease;
        }

        button:hover {
            background-color: #f0b827;
        }

        /* The Canvas / Flyer Preview (1:1 Ratio) */
        .preview-container {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        #quote-canvas {
            width: 500px;
            height: 500px;
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 40px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Design Layout Elements */
        .quote-icon {
            font-family: 'Cinzel', serif;
            font-size: 90px;
            color: var(--accent-color);
            line-height: 40px;
            margin-top: 20px;
            user-select: none;
        }

        .quote-text-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 90%;
        }

        .quote-text {
            font-family: 'Cinzel', serif;
            color: var(--text-white);
            font-size: 24px;
            line-height: 1.6;
            margin: 0;
            white-space: pre-line;
            /* Respects line breaks */
            word-break: break-word;
        }

        .footer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .divider {
            width: 40px;
            height: 1.5px;
            background-color: var(--accent-color);
            margin-bottom: 15px;
        }

        .author {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 5px;
            color: var(--text-white);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .branding {
            font-size: 9px;
            letter-spacing: 3px;
            color: var(--text-gray);
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <h1>Quote Image Hub</h1>

    <!-- Inputs -->
    <div class="controls">
        <div class="form-group">
            <label for="input-text">Quote (Use Enter key to split into 3 lines manually for perfect balance)</label>
            <textarea id="input-text">A man that understands
Principles will get
more Miracles</textarea>
        </div>
        <div class="form-group">
            <label for="input-author">Author</label>
            <input type="text" id="input-author" value="Anteeny">
        </div>
        <button id="download-btn">Download PNG</button>
    </div>

    <!-- The 1:1 Flyer Output -->
    <div class="preview-container">
        <div id="quote-canvas">
            <div class="quote-icon">“</div>

            <div class="quote-text-container">
                <p class="quote-text" id="quote-display">A man that understands<br>Principles will get<br>more Miracles
                </p>
            </div>

            <div class="footer-area">
                <div class="divider"></div>
                <div class="author" id="author-display">Anteeny</div>
                <div class="branding">LIFE'SBEREAL</div>
            </div>
        </div>
    </div>

    <script>
        const inputText = document.getElementById('input-text');
        const inputAuthor = document.getElementById('input-author');
        const quoteDisplay = document.getElementById('quote-display');
        const authorDisplay = document.getElementById('author-display');
        const downloadBtn = document.getElementById('download-btn');
        const canvasContainer = document.getElementById('quote-canvas');

        // Update Flyer Text in Real-Time
        inputText.addEventListener('input', () => {
            quoteDisplay.textContent = inputText.value;
        });

        inputAuthor.addEventListener('input', () => {
            authorDisplay.textContent = inputAuthor.value;
        });

        // Convert HTML Element to High-Quality Image and Trigger Download
        downloadBtn.addEventListener('click', () => {
            // scale: 2 ensures high resolution (1000x1000px download from a 500x500px CSS container)
            html2canvas(canvasContainer, {
                scale: 2,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `quote-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>

</html>
