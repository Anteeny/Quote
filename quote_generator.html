<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Quote Image Generator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Dancing+Script:wght@600;700&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- html2canvas library for high quality rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Modern CSS Reset & Variable Tokens */
        :root {
            --bg-color: #08090d;
            --card-bg: rgba(15, 17, 26, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-default: #DAA520; /* Gold */
            --accent-color: #DAA520;
            --text-white: #FFFFFF;
            --text-gray: #a0a0b0;
            --glass-shine: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 40px 20px;
        }

        /* Ambient Glowing Background Blobs */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            animation: pulse 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #a855f7 0%, rgba(99,102,241,0) 70%);
            top: -10%;
            left: -10%;
        }

        .blob-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #f43f5e 0%, rgba(244,63,94,0) 70%);
            bottom: -10%;
            right: -10%;
            animation-delay: -7s;
        }

        .blob-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #0ea5e9 0%, rgba(14,165,233,0) 70%);
            top: 40%;
            left: 45%;
            animation-delay: -14s;
        }

        @keyframes pulse {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, -40px) scale(1.1); }
            100% { transform: translate(-30px, 30px) scale(0.95); }
        }

        /* App Wrapper */
        .app-container {
            max-width: 1100px;
            width: 100%;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 40%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-gray);
            font-size: 0.95rem;
            font-weight: 400;
        }

        /* Main Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 968px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        /* Glassmorphic Panel Styles */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        /* Controls Panel Form Styles */
        .controls-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #d8b4fe;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-gray);
            text-transform: uppercase;
        }

        textarea, input, select {
            width: 100%;
            padding: 12px 14px;
            background-color: rgba(10, 11, 18, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-white);
            font-family: inherit;
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
        }

        textarea:focus, input:focus, select:focus {
            border-color: #c084fc;
            box-shadow: 0 0 0 2px rgba(192, 132, 252, 0.15);
            background-color: rgba(10, 11, 18, 0.9);
        }

        textarea {
            resize: vertical;
            height: 90px;
            line-height: 1.5;
        }

        /* Action Sliders & Alignments */
        .range-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .range-value {
            font-size: 0.85rem;
            color: #d8b4fe;
            min-width: 32px;
            text-align: right;
            font-weight: 600;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            border: none;
            padding: 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #c084fc;
            cursor: pointer;
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Checkbox & Switch Layout */
        .switch-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .switch-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-white);
        }

        .switch-control {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch-control input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider-round {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .3s;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slider-round:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider-round {
            background-color: #a855f7;
        }

        input:checked + .slider-round:before {
            transform: translateX(22px);
        }

        /* Alignment Toggle Buttons */
        .align-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: rgba(10, 11, 18, 0.7);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .align-btn {
            background: transparent;
            border: none;
            color: var(--text-gray);
            padding: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .align-btn.active {
            background: #a855f7;
            color: white;
        }

        /* Color presets grid */
        .color-grid {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .color-dot:hover {
            transform: scale(1.15);
        }

        .color-dot.active {
            border-color: #ffffff;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        /* Preset themes selection */
        .theme-select-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .theme-btn {
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            transition: all 0.2s ease;
        }

        .theme-btn:hover {
            transform: translateY(-2px);
        }

        .theme-btn.active {
            border-color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        /* Preset Background Styles */
        .theme-midnight { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #30103b 100%); }
        .theme-sunset { background: linear-gradient(135deg, #1e1b4b 0%, #450a0a 50%, #78350f 100%); }
        .theme-forest { background: linear-gradient(135deg, #022c22 0%, #064e3b 50%, #0d9488 100%); }
        .theme-cosmic { background: linear-gradient(135deg, #0f172a 0%, #2563eb 50%, #c084fc 100%); }
        .theme-velvet { background: linear-gradient(135deg, #180828 0%, #0f051d 50%, #000000 100%); }
        .theme-minimal { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }

        /* The Canvas Wrapper & Flyer */
        .canvas-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: 40px;
        }

        .preview-shadow-wrap {
            box-shadow: 0 25px 60px -15px rgba(0,0,0,0.7);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        #quote-canvas {
            width: 500px;
            height: 500px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 40px;
            overflow: hidden;
        }

        /* Custom subtle overlay grids inside canvas to enhance preview */
        .canvas-overlay-grid {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 0),
                radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 0);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            opacity: 0.15;
            pointer-events: none;
        }

        /* Glowing Accent Blob inside the Canvas behind Card */
        .canvas-glow {
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: var(--accent-color);
            opacity: 0.15;
            filter: blur(60px);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        /* Glassmorphic card centered inside canvas */
        .glass-card {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            padding: 35px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Visual Glass Grain simulated via noise overlay */
        .glass-grain {
            position: absolute;
            inset: 0;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
            border-radius: inherit;
        }

        .quote-icon {
            font-size: 72px;
            color: var(--accent-color);
            line-height: 1;
            margin-top: 10px;
            opacity: 0.85;
            user-select: none;
            transition: color 0.3s ease;
        }

        .quote-text-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 0;
        }

        .quote-text {
            color: var(--text-white);
            line-height: 1.5;
            margin: 0;
            white-space: pre-line;
            word-break: break-word;
            transition: all 0.2s ease;
        }

        .footer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .divider {
            width: 35px;
            height: 2px;
            background-color: var(--accent-color);
            margin-bottom: 15px;
            border-radius: 1px;
            transition: color 0.3s ease;
        }

        .author {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--text-white);
            text-transform: uppercase;
            margin-bottom: 15px;
            margin-left: 5px; /* offset letter spacing centering issue */
        }

        .branding {
            font-size: 0.55rem;
            letter-spacing: 3px;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-left: 3px;
            opacity: 0.6;
        }

        /* Large Download Action Button */
        .download-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(168, 85, 247, 0.5);
            background: linear-gradient(135deg, #b55fe6 0%, #8b5cf6 100%);
        }

        .download-btn:active {
            transform: translateY(1px);
        }

        .download-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <header>
            <h1>Quote Image Hub</h1>
            <p>Design and download beautiful cinematic quotes with premium glassmorphic styling</p>
        </header>

        <div class="dashboard">
            <!-- Left Panel: Controls -->
            <div class="glass-panel">
                <div class="controls-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    Customization Panel
                </div>

                <div class="control-group">
                    <label for="input-text">Quote content</label>
                    <textarea id="input-text">A man that understands
Principles will get
more Miracles</textarea>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label for="input-author">Author</label>
                        <input type="text" id="input-author" value="Anteeny">
                    </div>
                    <div class="control-group">
                        <label for="input-branding">Sub-branding / Tag</label>
                        <input type="text" id="input-branding" value="LIFE'SBEREAL">
                    </div>
                </div>

                <!-- Theme Preset Gradients -->
                <div class="control-group">
                    <label>Canvas Theme Background</label>
                    <div class="theme-select-container">
                        <div class="theme-btn theme-midnight active" data-theme="theme-midnight">Midnight</div>
                        <div class="theme-btn theme-sunset" data-theme="theme-sunset">Sunset</div>
                        <div class="theme-btn theme-forest" data-theme="theme-forest">Forest</div>
                        <div class="theme-btn theme-cosmic" data-theme="theme-cosmic">Cosmic</div>
                        <div class="theme-btn theme-velvet" data-theme="theme-velvet">Velvet</div>
                        <div class="theme-btn theme-minimal" data-theme="theme-minimal">Minimal</div>
                    </div>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label for="select-font">Font Family</label>
                        <select id="select-font">
                            <option value="'Cinzel', serif" selected>Cinzel (Classic Serif)</option>
                            <option value="'Playfair Display', serif">Playfair (Elegant Serif)</option>
                            <option value="'Montserrat', sans-serif">Montserrat (Modern Sans)</option>
                            <option value="'Dancing Script', cursive">Dancing Script (Script)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>Text Alignment</label>
                        <div class="align-buttons">
                            <button class="align-btn" data-align="left">Left</button>
                            <button class="align-btn active" data-align="center">Center</button>
                            <button class="align-btn" data-align="right">Right</button>
                        </div>
                    </div>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label>Font Size</label>
                        <div class="range-container">
                            <input type="range" id="slider-fontsize" min="16" max="46" value="23">
                            <span class="range-value" id="val-fontsize">23px</span>
                        </div>
                    </div>
                    <div class="control-group">
                        <label>Glass Transparency</label>
                        <div class="range-container">
                            <input type="range" id="slider-opacity" min="0" max="80" value="8">
                            <span class="range-value" id="val-opacity">8%</span>
                        </div>
                    </div>
                </div>

                <!-- Custom Accent Colors -->
                <div class="control-group">
                    <label>Highlight Accent Color</label>
                    <div class="color-grid">
                        <div class="color-dot active" style="background-color: #DAA520;" data-color="#DAA520"></div>
                        <div class="color-dot" style="background-color: #ec4899;" data-color="#ec4899"></div>
                        <div class="color-dot" style="background-color: #06b6d4;" data-color="#06b6d4"></div>
                        <div class="color-dot" style="background-color: #10b981;" data-color="#10b981"></div>
                        <div class="color-dot" style="background-color: #f43f5e;" data-color="#f43f5e"></div>
                        <div class="color-dot" style="background-color: #a855f7;" data-color="#a855f7"></div>
                    </div>
                </div>

                <!-- Card Toggles -->
                <div class="control-row" style="margin-top: 10px;">
                    <div class="switch-group" style="width: 100%;">
                        <span class="switch-label">Show Card Border</span>
                        <label class="switch-control">
                            <input type="checkbox" id="check-border" checked>
                            <span class="slider-round"></span>
                        </label>
                    </div>
                    <div class="switch-group" style="width: 100%;">
                        <span class="switch-label">Show Quote Icon</span>
                        <label class="switch-control">
                            <input type="checkbox" id="check-icon" checked>
                            <span class="slider-round"></span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Canvas Preview & Download -->
            <div class="canvas-area">
                <div class="preview-shadow-wrap">
                    <div id="quote-canvas" class="theme-midnight">
                        <div class="canvas-overlay-grid"></div>
                        <div class="canvas-glow"></div>
                        
                        <div class="glass-card" id="quote-card">
                            <div class="glass-grain"></div>
                            <div class="quote-icon" id="quote-icon-element">“</div>
                            
                            <div class="quote-text-container">
                                <p class="quote-text" id="quote-display">A man that understands<br>Principles will get<br>more Miracles</p>
                            </div>

                            <div class="footer-area">
                                <div class="divider" id="quote-divider"></div>
                                <div class="author" id="author-display">Anteeny</div>
                                <div class="branding" id="branding-display">LIFE'SBEREAL</div>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="download-btn" id="download-btn">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    Download Quote Card (PNG)
                </button>
            </div>
        </div>
    </div>

    <script>
        // Interactive Elements Selector
        const inputText = document.getElementById('input-text');
        const inputAuthor = document.getElementById('input-author');
        const inputBranding = document.getElementById('input-branding');
        const selectFont = document.getElementById('select-font');
        const sliderFontsize = document.getElementById('slider-fontsize');
        const valFontsize = document.getElementById('val-fontsize');
        const sliderOpacity = document.getElementById('slider-opacity');
        const valOpacity = document.getElementById('val-opacity');
        const checkBorder = document.getElementById('check-border');
        const checkIcon = document.getElementById('check-icon');
        const downloadBtn = document.getElementById('download-btn');

        // Target Preview Elements
        const canvasContainer = document.getElementById('quote-canvas');
        const quoteCard = document.getElementById('quote-card');
        const quoteDisplay = document.getElementById('quote-display');
        const authorDisplay = document.getElementById('author-display');
        const brandingDisplay = document.getElementById('branding-display');
        const quoteIconElement = document.getElementById('quote-icon-element');
        const quoteDivider = document.getElementById('quote-divider');

        // Dynamic State
        let currentAlignment = 'center';
        let currentAccentColor = '#DAA520';

        // 1. Text & Branding Updates
        inputText.addEventListener('input', () => {
            quoteDisplay.textContent = inputText.value;
        });

        inputAuthor.addEventListener('input', () => {
            authorDisplay.textContent = inputAuthor.value;
        });

        inputBranding.addEventListener('input', () => {
            brandingDisplay.textContent = inputBranding.value;
        });

        // 2. Font Style & Alignment Updates
        selectFont.addEventListener('change', () => {
            quoteDisplay.style.fontFamily = selectFont.value;
        });

        sliderFontsize.addEventListener('input', () => {
            const size = sliderFontsize.value;
            quoteDisplay.style.fontSize = `${size}px`;
            valFontsize.textContent = `${size}px`;
        });

        // Alignment Buttons Logic
        document.querySelectorAll('.align-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.align-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentAlignment = btn.getAttribute('data-align');
                quoteDisplay.style.textAlign = currentAlignment;
                
                // Adjust container flex align for non-center text
                const alignMap = { 'left': 'flex-start', 'center': 'center', 'right': 'flex-end' };
                quoteDisplay.parentElement.style.justifyContent = alignMap[currentAlignment];
            });
        });

        // 3. Card Translucency & Styling Updates
        function updateCardStyles() {
            const opacityPct = sliderOpacity.value;
            valOpacity.textContent = `${opacityPct}%`;
            
            // Adjust card background glass levels
            const glassOpacity = opacityPct / 100;
            // Mixed translucent dark and white background to give frosted feel
            quoteCard.style.backgroundColor = `rgba(15, 17, 26, ${0.4 + glassOpacity * 0.5})`;
            
            // Card Border logic
            if (checkBorder.checked) {
                quoteCard.style.border = `1px solid rgba(255, 255, 255, ${0.05 + (opacityPct / 200)})`;
            } else {
                quoteCard.style.border = 'none';
            }

            // Quote Icon visibility
            quoteIconElement.style.display = checkIcon.checked ? 'block' : 'none';
        }

        sliderOpacity.addEventListener('input', updateCardStyles);
        checkBorder.addEventListener('change', updateCardStyles);
        checkIcon.addEventListener('change', updateCardStyles);

        // 4. Custom Accent Color selection
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                
                const hexColor = dot.getAttribute('data-color');
                currentAccentColor = hexColor;
                document.documentElement.style.setProperty('--accent-color', hexColor);
                
                quoteIconElement.style.color = hexColor;
                quoteDivider.style.backgroundColor = hexColor;
                
                // update local glowing blob inside canvas too
                document.querySelector('.canvas-glow').style.background = hexColor;
            });
        });

        // 5. Canvas Theme presets
        document.querySelectorAll('.theme-btn').forEach(themeBtn => {
            themeBtn.addEventListener('click', () => {
                document.querySelectorAll('.theme-btn').forEach(tb => tb.classList.remove('active'));
                themeBtn.classList.add('active');
                
                // Remove all existing themes
                canvasContainer.className = '';
                // Add the newly selected theme class
                canvasContainer.classList.add(themeBtn.getAttribute('data-theme'));
            });
        });

        // Initialize Card Values on Load
        quoteDisplay.style.fontSize = `${sliderFontsize.value}px`;
        quoteDisplay.style.fontFamily = selectFont.value;
        updateCardStyles();

        // 6. html2canvas Download implementation
        downloadBtn.addEventListener('click', () => {
            // Apply scale: 3 for high-res output matching physical print standards
            html2canvas(canvasContainer, {
                scale: 3,
                useCORS: true,
                allowTaint: true,
                backgroundColor: null // transparency support if needed
            }).then(canvas => {
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().slice(0, 10);
                link.download = `quote-${timestamp}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
